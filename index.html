<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Закрытый доступ</title>
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-BVKSSLL5NX"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag("js", new Date());
			gtag("config", "G-BVKSSLL5NX");
		</script>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="screen">
			<div class="content">
				<h1 class="headline">TRUSTEX TEAM</h1>
				<a id="tg-button" class="cta" href="https://t.me/TrustExHR_BoT?start=E7ABO8UI">Открыть в Telegram</a>
				<p class="caption">Доступ ограничен</p>
			</div>
		</main>

		<script>
			console.log('🔧 Analytics скрипт загружается...');

			// Отправка события на локальный сервер
			function sendAnalyticsEvent(eventType) {
				console.log('📊 Отправляю событие:', eventType);
				
				fetch('http://localhost:3001/api/event', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({
						eventType: eventType,
						timestamp: new Date().toISOString()
					})
				})
				.then(response => {
					console.log('✅ Response получен:', response.status);
					return response.json();
				})
				.then(data => {
					console.log('✅ Событие успешно отправлено:', data);
				})
				.catch(error => {
					console.error('❌ Ошибка отправки события:', error);
				});
			}

			// Проверяем что DOM готов
			console.log('🔍 Проверяю DOM...');
			console.log('   Button найдена?', document.getElementById('tg-button') ? 'ДА' : 'НЕТ');

			// Отслеживание просмотра страницы
			if (document.readyState === 'loading') {
				console.log('⏳ Документ еще загружается, жду load...');
				document.addEventListener('DOMContentLoaded', function() {
					console.log('📄 DOMContentLoaded сработал');
					setTimeout(() => {
						console.log('📄 Отправляю page_view');
						sendAnalyticsEvent('page_view');
						gtag('event', 'page_view');
					}, 100);
				});
			} else {
				console.log('📄 Документ уже готов, отправляю page_view сразу');
				sendAnalyticsEvent('page_view');
				gtag('event', 'page_view');
			}

			// Отслеживание клика по кнопке Telegram
			const tgButton = document.getElementById('tg-button');
			if (tgButton) {
				console.log('✅ Button найдена, добавляю слушателя клика');
				tgButton.addEventListener('click', function(e) {
					console.log('🔘 КЛИК ПО КНОПКЕ!');
					sendAnalyticsEvent('button_click');
					
					gtag('event', 'button_click', {
						'event_category': 'engagement',
						'event_label': 'telegram_button',
						'button_text': 'Открыть в Telegram'
					});
				});
			} else {
				console.error('❌ Button не найдена в DOM!');
			}

			console.log('✅ Analytics скрипт готов к работе');
		</script>
	</body>
</html>
