<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Закрытый доступ</title>
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-BVKSSLL5NX"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag("js", new Date());
			gtag("config", "G-BVKSSLL5NX");
		</script>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="screen">
			<div class="content">
				<h1 class="headline">TRUSTEX TEAM</h1>
				<a id="tg-button" class="cta" href="https://t.me/TrustExHR_BoT?start=E7ABO8UI">Открыть в Telegram</a>
				<p class="caption">Доступ ограничен</p>
			</div>
		</main>

		<script>
			// Отправка события на локальный сервер
			function sendAnalyticsEvent(eventType) {
				fetch('http://localhost:3000/api/event', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({
						eventType: eventType,
						timestamp: new Date().toISOString()
					})
				}).catch(() => {
					// Сервер может быть не запущен, логируем в консоль
					console.log('Analytics server not running, but event would be:', eventType);
				});
			}

			// Отслеживание просмотра страницы
			window.addEventListener('load', function() {
				sendAnalyticsEvent('page_view');
				// Также отправляем в Google Analytics
				gtag('event', 'page_view');
			});

			// Отслеживание клика по кнопке Telegram
			document.getElementById('tg-button').addEventListener('click', function() {
				sendAnalyticsEvent('button_click');
				
				// Отправляем в Google Analytics
				gtag('event', 'button_click', {
					'event_category': 'engagement',
					'event_label': 'telegram_button',
					'button_text': 'Открыть в Telegram'
				});
			});
		</script>
	</body>
</html>
