<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Analytics Dashboard</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: #0a1220;
			color: #f2f5ff;
			padding: 20px;
			min-height: 100vh;
		}

		.container {
			max-width: 1000px;
			margin: 0 auto;
		}

		h1 {
			margin-bottom: 30px;
			text-align: center;
			font-size: 28px;
		}

		.stats {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			margin-bottom: 30px;
		}

		.stat-card {
			background: linear-gradient(135deg, #2b6bff 0%, #1c5be6 100%);
			padding: 20px;
			border-radius: 10px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
		}

		.stat-label {
			font-size: 14px;
			opacity: 0.9;
			margin-bottom: 10px;
		}

		.stat-value {
			font-size: 36px;
			font-weight: 700;
		}

		.events-section {
			background: rgba(255, 255, 255, 0.05);
			padding: 20px;
			border-radius: 10px;
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.events-section h2 {
			font-size: 18px;
			margin-bottom: 15px;
		}

		.events-list {
			max-height: 400px;
			overflow-y: auto;
			list-style: none;
		}

		.event-item {
			padding: 10px;
			background: rgba(43, 107, 255, 0.1);
			margin-bottom: 8px;
			border-radius: 5px;
			font-size: 13px;
			border-left: 3px solid #2b6bff;
		}

		.event-type {
			font-weight: 600;
			color: #2b6bff;
		}

		.event-time {
			color: rgba(210, 220, 245, 0.7);
			font-size: 12px;
		}

		.refresh-info {
			text-align: center;
			margin-top: 20px;
			font-size: 12px;
			color: rgba(210, 220, 245, 0.6);
		}

		@media (max-width: 600px) {
			.stats {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>📊 TrustEx Analytics Dashboard</h1>
		
		<div class="stats">
			<div class="stat-card">
				<div class="stat-label">Просмотры страницы</div>
				<div class="stat-value" id="pageViews">0</div>
			</div>
			<div class="stat-card">
				<div class="stat-label">Клики по кнопке</div>
				<div class="stat-value" id="buttonClicks">0</div>
			</div>
		</div>

		<div class="events-section">
			<h2>📝 Последние события</h2>
			<ul class="events-list" id="eventsList"></ul>
		</div>

		<div class="refresh-info">
			⏱️ Обновляется каждую секунду в реал-тайме
		</div>
	</div>

	<script>
		const analyticsUrl = 'http://localhost:3001/api/analytics';

		async function updateAnalytics() {
			try {
				const response = await fetch(analyticsUrl);
				const data = await response.json();

				document.getElementById('pageViews').textContent = data.pageViews;
				document.getElementById('buttonClicks').textContent = data.buttonClicks;

				// Показываем последние 50 событий
				const eventsList = document.getElementById('eventsList');
				eventsList.innerHTML = '';

				data.events.slice().reverse().slice(0, 50).forEach(event => {
					const li = document.createElement('li');
					li.className = 'event-item';
					
					const eventLabel = event.type === 'page_view' ? '👁️ Просмотр' : '🔘 Клик по кнопке';
					const time = new Date(event.timestamp).toLocaleString('ru-RU');
					
					li.innerHTML = `
						<span class="event-type">${eventLabel}</span> 
						<span class="event-time">${time}</span>
					`;
					eventsList.appendChild(li);
				});
			} catch (error) {
				console.error('Ошибка подключения к серверу:', error);
				document.querySelector('.refresh-info').textContent = '❌ Сервер не запущен. Запустите: start-analytics.bat';
			}
		}

		// Обновляем аналитику каждую секунду
		updateAnalytics();
		setInterval(updateAnalytics, 1000);
	</script>
</body>
</html>
